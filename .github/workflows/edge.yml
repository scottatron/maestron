name: Edge Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  edge:
    name: Build and Publish Edge Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip if commit is an exact release tag
        id: check
        run: |
          if git describe --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute edge tag
        if: steps.check.outputs.skip == 'false'
        id: tag
        run: |
          # Find the latest stable release tag (exact semver, no pre-release suffix)
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            EDGE_TAG="v0.0.1-edge"
          else
            # Bump patch and append -edge: v0.4.2 → v0.4.3-edge
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            EDGE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))-edge"
          fi
          echo "edge_tag=${EDGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        if: steps.check.outputs.skip == 'false'
        env:
          EDGE_TAG: ${{ steps.tag.outputs.edge_tag }}
        run: |
          mkdir -p dist
          for PLATFORM in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS="${PLATFORM%/*}"
            ARCH="${PLATFORM#*/}"
            GOOS=$OS GOARCH=$ARCH CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags="-s -w -X github.com/scottatron/maestron/cmd.version=${EDGE_TAG}" \
                -o "dist/maestron_${EDGE_TAG}_${OS}_${ARCH}" .
          done

      - name: Generate checksums
        if: steps.check.outputs.skip == 'false'
        run: cd dist && sha256sum maestron_* > checksums.txt

      - name: Generate changelog since last release
        if: steps.check.outputs.skip == 'false'
        env:
          PREV_TAG: ${{ steps.tag.outputs.prev_tag }}
        run: |
          RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"

          FEATURES=$(git log ${RANGE:-HEAD} --pretty=format:"- %s (%h)" | grep -iE '^- feat(\(.+\))?[^!]:' || true)
          FIXES=$(git log ${RANGE:-HEAD}    --pretty=format:"- %s (%h)" | grep -iE '^- fix(\(.+\))?[^!]:' || true)
          OTHERS=$(git log ${RANGE:-HEAD}   --pretty=format:"- %s (%h)" | grep -viE '^- (feat|fix|chore|docs|ci|test|style|refactor|perf)(\(.+\))?[!:]' || true)

          BODY="Rolling pre-release built from \`main\` — updates automatically on every push.\n\n"
          [ -n "$FEATURES" ] && BODY="${BODY}## Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ]    && BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          [ -n "$OTHERS" ]   && BODY="${BODY}## Other Changes\n${OTHERS}\n\n"

          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}**Changes since ${PREV_TAG}:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...main\n"
          fi

          printf "%b" "$BODY" > /tmp/edge-changelog.md
          cat /tmp/edge-changelog.md

      - name: Move edge tag to HEAD
        if: steps.check.outputs.skip == 'false'
        env:
          EDGE_TAG: ${{ steps.tag.outputs.edge_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$EDGE_TAG"
          git push -f origin "$EDGE_TAG"

      - name: Update edge release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.tag.outputs.edge_tag }}
          name: "Edge (${{ steps.tag.outputs.edge_tag }})"
          prerelease: true
          make_latest: false
          body_path: /tmp/edge-changelog.md
          files: |
            dist/maestron_*
            dist/checksums.txt
          fail_on_unmatched_files: true
